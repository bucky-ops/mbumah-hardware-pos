name: Deploy to Production

on:
  push:
    branches: ["main", "update"]

env:
  DATABASE_URL: "file:./test.db"
  # DIRECT_URL is required by prisma/schema.prisma (directUrl = env("DIRECT_URL")).
  # For the SQLite build environment we point it at the same file. In production
  # (Vercel/Neon) this is set to the non-pooled direct Postgres connection string.
  DIRECT_URL: "file:./test.db"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/update')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build the project
        run: bun run build

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy-artifact
          cp -r .next deploy-artifact/
          cp -r public deploy-artifact/
          cp package.json deploy-artifact/
          cp bun.lock deploy-artifact/ 2>/dev/null || true
          cp next.config.ts deploy-artifact/ 2>/dev/null || true

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy
          path: deploy-artifact/
          retention-days: 5

      # ── Vercel Deployment (placeholder) ──────────────────────────
      # Uncomment and configure the steps below when ready to deploy
      # to Vercel. You'll need to add VERCEL_TOKEN and VERCEL_ORG_ID
      # as GitHub Secrets in your repository settings.
      #
      # - name: Install Vercel CLI
      #   run: bun add -g vercel@latest
      #
      # - name: Pull Vercel project settings
      #   run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      #
      # - name: Build with Vercel
      #   run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      #
      # - name: Deploy to Vercel
      #   run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
      #   env:
      #     VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      #     VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Build prepared (Vercel deployment not yet configured)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To enable Vercel deployment, uncomment the Vercel steps and add the following secrets:" >> $GITHUB_STEP_SUMMARY
          echo "- \`VERCEL_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`VERCEL_ORG_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`VERCEL_PROJECT_ID\`" >> $GITHUB_STEP_SUMMARY
