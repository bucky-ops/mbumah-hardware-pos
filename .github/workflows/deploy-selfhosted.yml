# ============================================================================
# MBUMAH HARDWARE POS — Self-Hosted Deployment Workflow
# ============================================================================
# Builds the Docker image, pushes to GitHub Container Registry (GHCR),
# then SSHs into the production server to pull and restart.
#
# TRIGGER: Manual (workflow_dispatch) or on release publication.
#
# SECRETS REQUIRED (set in GitHub repo → Settings → Secrets → Actions):
#   DEPLOY_HOST        — IP or hostname of the production server
#   DEPLOY_USER        — SSH username (e.g., "ubuntu")
#   DEPLOY_SSH_KEY     — Private SSH key for authentication
#   DEPLOY_PATH        — Path to the project on the server (e.g., "/opt/mbumah-pos")
#   DEPLOY_COMPOSE     — Compose file name (default: "docker-compose.prod.yml")
#
# OPTIONAL SECRETS:
#   GHCR_TOKEN         — GitHub PAT with write:packages scope (if not using GITHUB_TOKEN)
# ============================================================================

name: Deploy to Self-Hosted Server

on:
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      seed_database:
        description: "Run database seed after deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Auto-deploy on release publication
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build & Push Docker Image ──────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the release version (e.g., v3.0.0)
            type=semver,pattern={{version}}
            # Tag with the major version (e.g., v3)
            type=semver,pattern={{major}}.{{minor}}
            # Always tag latest on main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with short SHA for traceability
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build-time args (none currently needed, but available for future use)
          build-args: |
            NODE_ENV=production

      - name: Output image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # ── Job 2: Deploy to Server ───────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.DEPLOY_HOST != '' }}

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull latest code & restart services
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE || 'docker-compose.prod.yml' }}
          SEED_DB: ${{ github.event.inputs.seed_database || 'false' }}
        run: |
          ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_HOST} << 'DEPLOY_SCRIPT'
          set -e

          echo "═══════════════════════════════════════════════════════════"
          echo "  MBUMAH HARDWARE POS — Deploying Update"
          echo "═══════════════════════════════════════════════════════════"

          cd "${DEPLOY_PATH}"

          # Pull latest code
          echo "[1/5] Pulling latest code from GitHub..."
          git pull origin main

          # Pull latest Docker image
          echo "[2/5] Pulling latest Docker image from GHCR..."
          docker compose -f "${COMPOSE_FILE}" pull app

          # Push database schema changes
          echo "[3/5] Pushing database schema changes..."
          docker compose -f "${COMPOSE_FILE}" exec -T app npx prisma db push --skip-generate 2>&1 || echo "⚠️  Schema push failed — may need manual migration"

          # Seed database if requested
          if [ "${SEED_DB}" = "true" ]; then
            echo "[3b/5] Seeding database..."
            docker compose -f "${COMPOSE_FILE}" exec -T app npx prisma db seed 2>&1 || echo "⚠️  Seed failed"
          fi

          # Restart services with the new image
          echo "[4/5] Restarting services..."
          docker compose -f "${COMPOSE_FILE}" up -d --remove-orphans

          # Wait for app to be healthy
          echo "[5/5] Waiting for health check..."
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if docker compose -f "${COMPOSE_FILE}" exec -T app wget -q -O- http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ App is healthy!"
              break
            fi
            echo "   Waiting... (${elapsed}s / ${timeout}s)"
            sleep 5
            elapsed=$((elapsed + 5))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "❌ App did not become healthy within ${timeout}s"
            echo "   Check logs: docker compose -f ${COMPOSE_FILE} logs app --tail=100"
            exit 1
          fi

          # Clean up old images
          docker image prune -f

          echo ""
          echo "✅ Deployment complete!"
          echo "═══════════════════════════════════════════════════════════"
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
