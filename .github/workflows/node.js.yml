name: Node.js CI with Webpack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  JWT_SECRET: ci-test-secret-do-not-use-in-production
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NEXT_PUBLIC_CURRENCY: KES
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: bun

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run ESLint
        run: bun run lint

  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mbumah_pos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbumah_pos_test?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: bun

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-node${{ matrix.node-version }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-node${{ matrix.node-version }}-

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-node${{ matrix.node-version }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-node${{ matrix.node-version }}-

      - name: Cache Prisma Client
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.prisma
            node_modules/@prisma/client
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Switch Prisma to PostgreSQL provider for CI
        run: sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Push Prisma schema to PostgreSQL
        run: bunx prisma db push --skip-generate

      - name: Build with Webpack (next build)
        run: bun run build

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mbumah_pos_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mbumah_pos_integration?schema=public
      JWT_SECRET: ci-integration-test-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CURRENCY: KES

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: bun

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Switch Prisma to PostgreSQL provider for CI
        run: sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Push Prisma schema
        run: bunx prisma db push --skip-generate

      - name: Seed database
        run: bunx prisma db seed

      - name: Verify seed data
        run: |
          echo "Checking that seeded data exists in PostgreSQL..."
          bunx prisma db execute --stdin <<'SQL'
          SELECT COUNT(*) AS org_count FROM organizations;
          SQL
