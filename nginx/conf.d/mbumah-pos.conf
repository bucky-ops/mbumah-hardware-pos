# ============================================================================
# MBUMAH HARDWARE POS — Nginx Site Configuration (HTTP → HTTPS Redirect)
# ============================================================================
# This configuration handles:
#   1. HTTP → HTTPS redirect (port 80 → 443)
#   2. Let's Encrypt ACME challenge path for certbot
#   3. HTTPS server with full security headers and reverse proxy to Next.js
#
# IMPORTANT: Before enabling HTTPS, you need SSL certificates.
#   Option A: Use Let's Encrypt (see SELF_HOSTING_GUIDE.md)
#   Option B: Use self-signed certs for testing:
#     openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#       -keyout nginx/ssl/server.key -out nginx/ssl/server.crt \
#       -subj "/CN=mbumah-pos"
#
# Place this file at: nginx/conf.d/mbumah-pos.conf
# ============================================================================

# ── HTTP Server — Redirect all traffic to HTTPS ──────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge path (for certbot certificate validation)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Simple health endpoint for Docker healthcheck (doesn't need HTTPS)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL Configuration ──────────────────────────────────────────────────
    # Adjust paths if your certificates are stored differently.
    # For Let's Encrypt, certbot places files at:
    #   /etc/nginx/ssl/live/<domain>/fullchain.pem
    #   /etc/nginx/ssl/live/<domain>/privkey.pem
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Modern TLS configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (requires DNS resolution)
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Security Headers ───────────────────────────────────────────────────
    # HSTS — Force HTTPS for 1 year (includes subdomains, eligible for preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking — only allow same-origin framing
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS protection for older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unnecessary browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Cross-origin isolation
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Remove server version disclosure
    server_tokens off;

    # ── Connection Limits ──────────────────────────────────────────────────
    # Max 20 simultaneous connections per IP
    limit_conn conn_limit 20;

    # ── Next.js Static Assets ──────────────────────────────────────────────
    # Next.js places static files in /_next/static/. These are immutable
    # (content-hashed filenames) and can be cached aggressively.
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache for 1 year — filenames contain content hashes
        expires 365d;
        add_header Cache-Control "public, immutable";

        # Re-apply security headers (expires/add_header overrides proxy headers)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # ── Public Assets (images, manifest, etc.) ─────────────────────────────
    location /logo.svg {
        proxy_pass http://nextjs_app;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /manifest.json {
        proxy_pass http://nextjs_app;
        add_header Content-Type "application/manifest+json";
        expires 1h;
        add_header Cache-Control "public";
    }

    # Category/product images
    location /categories/ {
        proxy_pass http://nextjs_app;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── API Routes ─────────────────────────────────────────────────────────
    # Stricter rate limiting on API endpoints to prevent abuse
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade for WebSocket support (future use)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts — API routes may take longer (M-Pesa, reports, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Login / Auth — Brute-force Protection ──────────────────────────────
    # Extra rate limiting on authentication endpoints
    location /api/auth/ {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── M-Pesa Callback ────────────────────────────────────────────────────
    # Safaricom's servers send STK Push results to this endpoint.
    # Higher rate limit to handle callback bursts.
    location /api/payments/mpesa/callback {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── All Other Requests → Next.js ───────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade for WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Disable buffering for Server-Sent Events (future use)
        proxy_buffering off;
    }

    # ── Deny Access to Hidden Files ────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ── WebSocket Upgrade Map ────────────────────────────────────────────────────
# Required for proper HTTP → WebSocket upgrade handling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
