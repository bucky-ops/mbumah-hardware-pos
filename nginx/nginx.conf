# ============================================================================
# MBUMAH HARDWARE POS — Nginx Main Configuration
# ============================================================================
# This is the top-level nginx.conf loaded by the Nginx container.
# It includes the shared security headers map and delegates per-site
# configuration to files in /etc/nginx/conf.d/.
#
# Place this file at: nginx/nginx.conf (mounted in docker-compose.prod.yml)
# ============================================================================

# Run as www-data user inside the container
user nginx;

# Auto-detect number of CPU cores for worker processes
worker_processes auto;

# Error log — mounted to ./nginx/logs/ for host-side access
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # One worker connection per concurrent request; 1024 is a safe default
    # for a single-server POS deployment. Increase if you need more.
    worker_connections 1024;
    # Accept all incoming connections at once (vs. one at a time)
    multi_accept on;
}

http {
    # ── Basic Settings ─────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Timeout for keep-alive connections with clients
    keepalive_timeout 65;

    # Enable gzip compression for text-based responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ── Rate Limiting Zones ────────────────────────────────────────────────
    # General request rate limit: 30 requests/second per IP
    # Burst allows up to 50 extra requests; excess returns 503
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # API rate limit: 10 requests/second per IP (stricter for API endpoints)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Login rate limit: 5 requests/second per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

    # Connection limit: max 20 simultaneous connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream Definition ────────────────────────────────────────────────
    # The Next.js app container is accessible as "app" on the Docker network
    upstream nextjs_app {
        server app:3000;
        keepalive 64;
    }

    # ── Security Headers Map ───────────────────────────────────────────────
    # Shared variables for security headers applied in conf.d/*.conf
    map $host $security_headers {
        default "";
    }

    # ── Include Site Configurations ────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
